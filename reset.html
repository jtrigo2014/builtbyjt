<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Built by JT — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0a; --card: #111; --border: #222;
    --accent: #e8ff47; --text: #f0f0f0; --muted: #555; --muted2: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 75%);
  }
  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
    animation: fadeUp 0.5s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 3px;
    color: var(--accent); margin-bottom: 32px; display: block;
  }
  .eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase; color: var(--accent);
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--accent); }
  .heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px; letter-spacing: 1px; line-height: 0.92;
    margin-bottom: 10px;
  }
  .sub { font-size: 14px; color: var(--muted2); margin-bottom: 32px; line-height: 1.6; }
  .label {
    display: block; font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px;
    font-size: 15px; font-family: 'DM Sans', sans-serif;
    color: var(--text); outline: none; margin-bottom: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,255,71,0.08);
  }
  .input.error { border-color: #ff4444; }
  .err { font-size: 12px; color: #ff4444; margin-top: -10px; margin-bottom: 14px; display: none; }
  .err.visible { display: block; }
  .btn {
    width: 100%; background: var(--accent); color: #0a0a0a;
    border: none; border-radius: 10px; padding: 16px 24px;
    font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif;
    cursor: pointer; position: relative; overflow: hidden;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-text { transition: opacity 0.2s; }
  .btn-spinner {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center; opacity: 0;
  }
  .btn.loading .btn-text { opacity: 0; }
  .btn.loading .btn-spinner { opacity: 1; }
  .ring {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(10,10,10,0.2); border-top-color: #0a0a0a;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { text-align: center; display: none; }
  .success.visible { display: block; }
  .success-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(232,255,71,0.1); border: 1px solid rgba(232,255,71,0.3);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px; font-size: 28px;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="wrap">
  <span class="logo">BUILT <span style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:#444;vertical-align:middle;">by JT</span></span>

  <div id="formSection">
    <div class="eyebrow">Reset Password</div>
    <h1 class="heading">NEW<br><span style="color:var(--accent)">PASSWORD.</span></h1>
    <p class="sub">Choose a strong password — at least 6 characters.</p>

    <label class="label" for="pw">New Password</label>
    <input class="input" type="password" id="pw" placeholder="••••••••" autocomplete="new-password" autofocus />
    <div class="err" id="pwErr"></div>

    <label class="label" for="pw2">Confirm Password</label>
    <input class="input" type="password" id="pw2" placeholder="••••••••" autocomplete="new-password" />
    <div class="err" id="pw2Err"></div>

    <button class="btn" id="saveBtn" onclick="savePassword()">
      <span class="btn-text">Save Password →</span>
      <span class="btn-spinner"><div class="ring"></div></span>
    </button>
  </div>

  <div class="success" id="successSection">
    <div class="success-icon">✅</div>
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:1px;margin-bottom:12px;">PASSWORD SAVED.</h2>
    <p style="font-size:14px;color:var(--muted2);margin-bottom:28px;line-height:1.6;">You're all set. Redirecting you to the app...</p>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://sedngqjfsswcgchcihiq.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZG5ncWpmc3N3Y2djaGNpaGlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE2OTksImV4cCI6MjA5MjcwNzY5OX0.5S9d9LAwvNxOxJO8nUTpxTVuNr7Z2r2IREEYS3LbOIU';
  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function savePassword() {
    const pw = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    const btn = document.getElementById('saveBtn');

    // Clear errors
    document.getElementById('pwErr').classList.remove('visible');
    document.getElementById('pw2Err').classList.remove('visible');
    document.getElementById('pw').classList.remove('error');
    document.getElementById('pw2').classList.remove('error');

    if (!pw || pw.length < 6) {
      document.getElementById('pwErr').textContent = 'Password must be at least 6 characters.';
      document.getElementById('pwErr').classList.add('visible');
      document.getElementById('pw').classList.add('error');
      return;
    }

    if (pw !== pw2) {
      document.getElementById('pw2Err').textContent = 'Passwords do not match.';
      document.getElementById('pw2Err').classList.add('visible');
      document.getElementById('pw2').classList.add('error');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    const { error } = await _sb.auth.updateUser({ password: pw });

    if (error) {
      btn.classList.remove('loading');
      btn.disabled = false;
      document.getElementById('pwErr').textContent = 'Could not update password. Try again.';
      document.getElementById('pwErr').classList.add('visible');
      return;
    }

    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').classList.add('visible');

    setTimeout(() => {
      window.location.href = '/workout.html';
    }, 2000);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') savePassword();
  });
</script>
</body>
</html>
