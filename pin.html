<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Built by JT — Enter PIN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111;
    --border: #222;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
    --muted2: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 75%);
  }

  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 340px;
    padding: 24px;
    text-align: center;
    animation: fadeUp 0.5s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 32px;
  }

  .logo span {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; color: var(--muted);
    vertical-align: middle;
  }

  .heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px; letter-spacing: 1px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .subheading {
    font-size: 13px; color: var(--muted2);
    margin-bottom: 40px; line-height: 1.5;
  }

  /* PIN DOTS */
  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .pin-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all 0.15s ease;
  }

  .pin-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.1);
  }

  .pin-dot.error {
    background: #ff4444;
    border-color: #ff4444;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* KEYPAD */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 280px;
    margin: 0 auto 28px;
  }

  .key {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 10px;
    font-size: 24px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s, transform 0.1s, border-color 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }

  .key:active {
    background: #1a1a1a;
    border-color: var(--accent);
    transform: scale(0.95);
  }

  .key.delete {
    font-size: 18px;
    color: var(--muted2);
  }

  .key.empty {
    background: transparent;
    border-color: transparent;
    pointer-events: none;
  }

  /* SWITCH MODE */
  .switch-link {
    font-size: 12px; color: var(--muted2);
    margin-top: 8px;
  }

  .switch-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }

  /* STATUS */
  .status-msg {
    font-size: 12px;
    color: var(--muted2);
    margin-bottom: 16px;
    min-height: 18px;
    letter-spacing: 0.5px;
  }

  .status-msg.error { color: #ff4444; }
  .status-msg.success { color: var(--accent); }

  /* SPINNER */
  .spinner {
    display: none;
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="wrap">
  <div class="logo">BUILT <span>by JT</span></div>
  <div class="heading" id="heading">ENTER PIN</div>
  <p class="subheading" id="subheading">Enter your 4-digit PIN to access your training.</p>

  <div class="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="status-msg" id="statusMsg"></div>

  <div class="keypad">
    <button class="key" onclick="pressKey('1')">1</button>
    <button class="key" onclick="pressKey('2')">2</button>
    <button class="key" onclick="pressKey('3')">3</button>
    <button class="key" onclick="pressKey('4')">4</button>
    <button class="key" onclick="pressKey('5')">5</button>
    <button class="key" onclick="pressKey('6')">6</button>
    <button class="key" onclick="pressKey('7')">7</button>
    <button class="key" onclick="pressKey('8')">8</button>
    <button class="key" onclick="pressKey('9')">9</button>
    <button class="key empty"></button>
    <button class="key" onclick="pressKey('0')">0</button>
    <button class="key delete" onclick="deleteKey()">⌫</button>
  </div>

  <div class="switch-link">
    <a href="/login.html">Use email magic link instead →</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://sedngqjfsswcgchcihiq.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlZG5ncWpmc3N3Y2djaGNpaGlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE2OTksImV4cCI6MjA5MjcwNzY5OX0.5S9d9LAwvNxOxJO8nUTpxTVuNr7Z2r2IREEYS3LbOIU';
  const APP_URL = '/workout.html';

  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let pin = '';
  let mode = 'enter'; // 'enter' or 'set'
  let storedEmail = localStorage.getItem('bjt_email');

  // ── On load: check if user has a PIN set ──
  (async function init() {
    const savedEmail = localStorage.getItem('bjt_email');
    const savedPin = localStorage.getItem('bjt_pin_set');

    if (!savedEmail) {
      // No email stored — send to magic link login
      window.location.href = '/login.html';
      return;
    }

    if (!savedPin) {
      // Email exists but no PIN set yet — set PIN mode
      setMode('set');
    }
  })();

  function setMode(m) {
    mode = m;
    if (m === 'set') {
      document.getElementById('heading').textContent = 'SET YOUR PIN';
      document.getElementById('subheading').textContent = 'Choose a 4-digit PIN for quick access next time.';
    } else {
      document.getElementById('heading').textContent = 'ENTER PIN';
      document.getElementById('subheading').textContent = 'Enter your 4-digit PIN to access your training.';
    }
  }

  function pressKey(num) {
    if (pin.length >= 4) return;
    pin += num;
    updateDots();
    if (pin.length === 4) {
      setTimeout(() => handlePIN(), 100);
    }
  }

  function deleteKey() {
    pin = pin.slice(0, -1);
    updateDots();
    setStatus('');
  }

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('dot' + i);
      dot.classList.toggle('filled', i < pin.length);
      dot.classList.remove('error');
    }
  }

  async function handlePIN() {
    if (mode === 'set') {
      await setPIN();
    } else {
      await verifyPIN();
    }
  }

  async function setPIN() {
    showSpinner(true);
    setStatus('Saving your PIN...');

    try {
      const email = localStorage.getItem('bjt_email');

      // Save PIN to Supabase
      const { error } = await _sb
        .from('profiles')
        .update({ pin: pin })
        .eq('email', email);

      if (error) throw error;

      localStorage.setItem('bjt_pin_set', 'true');
      setStatus('PIN set! Logging you in...', 'success');

      setTimeout(() => {
        window.location.href = APP_URL;
      }, 800);

    } catch (err) {
      showSpinner(false);
      showError('Could not save PIN. Try again.');
      pin = '';
      updateDots();
    }
  }

  async function verifyPIN() {
    showSpinner(true);
    setStatus('Checking...');

    try {
      const email = localStorage.getItem('bjt_email');

      const { data: profile, error } = await _sb
        .from('profiles')
        .select('pin, is_paid, subscription_status')
        .eq('email', email)
        .single();

      if (error) throw error;

      if (!profile?.pin) {
        // No PIN in DB yet — set mode
        showSpinner(false);
        setMode('set');
        pin = '';
        updateDots();
        return;
      }

      if (profile.pin !== pin) {
        showSpinner(false);
        showError('Wrong PIN. Try again.');
        pin = '';
        updateDots();
        return;
      }

      if (!profile.is_paid || profile.subscription_status !== 'active') {
        showSpinner(false);
        setStatus('No active subscription.', 'error');
        setTimeout(() => {
          window.location.href = 'https://trigonaut2.gumroad.com/l/mbyram';
        }, 1500);
        return;
      }

      setStatus('Welcome back!', 'success');
      setTimeout(() => {
        window.location.href = APP_URL;
      }, 500);

    } catch (err) {
      showSpinner(false);
      showError('Something went wrong. Try again.');
      pin = '';
      updateDots();
    }
  }

  function showError(msg) {
    setStatus(msg, 'error');
    for (let i = 0; i < 4; i++) {
      document.getElementById('dot' + i).classList.add('error');
    }
    setTimeout(() => {
      for (let i = 0; i < 4; i++) {
        document.getElementById('dot' + i).classList.remove('error');
      }
    }, 600);
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg' + (type ? ' ' + type : '');
  }

  function showSpinner(show) {
    document.getElementById('spinner').style.display = show ? 'block' : 'none';
  }
</script>
</body>
</html>
